name: Release helm chart

on:
  push:
    tags:
      - "v*"

permissions: read-all

jobs:
  release-chart:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: "Extract Version"
        id: extract_version
        run: |
          GIT_TAG=${GITHUB_REF##*/}
          VERSION=${GIT_TAG##v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      - name: Publish Helm chart
        uses: stefanprodan/helm-gh-pages@89c6698c192e70ed0e495bee7d3d1ca5b477fe82
        with:
          token: ${{ secrets.HELM_TOKEN }}
          charts_dir: helm
          charts_url: https://helm.strrl.dev
          owner: strrl
          repository: helm.strrl.dev
          branch: gh-pages
          app_version: ${{ steps.extract_version.outputs.version }}
          chart_version: ${{ steps.extract_version.outputs.version }}
