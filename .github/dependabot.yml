# Dependabot configuration
# https://docs.github.com/github/administering-a-repository/configuration-options-for-dependency-updates

version: 2
updates:
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      # controller runtime and k8s.io libraries must be bumped together,
      # they share the same upstream release cadence
      kubernetes:
        patterns:
          - "k8s.io/*"
          - "sigs.k8s.io/*"
      # everything else lands in a single weekly PR
      go-deps:
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      actions:
        patterns:
          - "*"
